# Broker Supabase local config
# See: https://supabase.com/docs/guides/cli/config

project_id = "broker-kenya"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:4200"
additional_redirect_urls = ["http://localhost:4200"]

[auth.email]
enable_signup = true
enable_confirmations = false
